<text x="40" y="755" class="sec-title">NOTES:</text>
<text x="40" y="777" class="note">1. SDIO pull-ups: CMD = 10 kΩ, DAT[0:3]/CLK = 47 kΩ, all to 3.3V VDDIO</text>
<text x="40" y="793" class="note">2. config.txt:  dtoverlay=disable-wifi  dtoverlay=sdio,poll_once=off,bus_width=4</text>
<text x="40" y="809" class="note">3. Decouple VBAT, VBAT_TX, VDDIO with 10 µF + 0.1 µF MLCC each, placed within 5 mm of pin</text>
<text x="40" y="825" class="note">4. Antenna: 50 Ω impedance-controlled trace to U.FL connector; no stubs; follow module antenna keep-out</text>
<text x="40" y="841" class="note">5. Keep SDIO traces under 100 mm, match lengths for CLK group, avoid vias on CLK</text>
<text x="40" y="857" class="note">6. Series termination (22 Ω) on CLK/DATA can improve signal integrity on longer PCB traces</text>
<text x="40" y="873" class="note">7. Driver: git clone https://github.com/MorseMicro/morse_driver.git  |  make CONFIG_MORSE_SDIO=y</text>
<text x="40" y="889" class="note">8. Firmware: git clone https://github.com/MorseMicro/morse-firmware.git  |  install to /lib/firmware/morse/</text>
<text x="40" y="905" class="note">9. VDDIO must never exceed VBAT — tie all to Pi 3.3V rail for simplest design</text>
<text x="40" y="921" class="note">10. The Pi Zero 2W 40-pin header maps to GPIO 22-27 via ALT3 function (not ALT0, which is the internal SDIO).</text>
</svg>