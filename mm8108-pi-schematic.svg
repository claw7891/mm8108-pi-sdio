<text x="550" y="30" class="">MM8108 Wi-Fi HaLow Module  →  Raspberry Pi Zero 2W  (SDIO Interface)</text>
<text x="550" y="52" class="sub">4-bit SDIO  ·  GPIO 22-27 ALT3  ·  40-pin GPIO Header  ·  config.txt: dtoverlay=sdio,poll_once=off,bus_width=4</text>
